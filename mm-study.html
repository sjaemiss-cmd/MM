<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>MM 중간고사 학습</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--pri:#2563eb;--ok:#16a34a;--no:#dc2626;--bg:#f1f5f9;--card:#fff;--txt:#1e293b;--sub:#64748b;--bdr:#e2e8f0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:var(--bg);color:var(--txt);min-height:100dvh;-webkit-tap-highlight-color:transparent}
.screen{display:none;min-height:100dvh;padding:0 0 env(safe-area-inset-bottom)}
.screen.active{display:flex;flex-direction:column}

/* HOME */
#home{align-items:center;justify-content:center;padding:24px;gap:16px}
#home h1{font-size:24px;font-weight:800;text-align:center}
#home .subtitle{color:var(--sub);font-size:14px;text-align:center;margin-bottom:8px}
#home .stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:360px}
#home .stat{background:var(--card);border-radius:12px;padding:14px;text-align:center;border:1px solid var(--bdr)}
#home .stat .num{font-size:28px;font-weight:800;color:var(--pri)}
#home .stat .label{font-size:12px;color:var(--sub);margin-top:2px}
.menu{width:100%;max-width:360px;display:flex;flex-direction:column;gap:10px}
.menu-btn{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:16px 20px;font-size:16px;font-weight:600;text-align:left;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all .15s}
.menu-btn:active{transform:scale(.97);background:#f8fafc}
.menu-btn .icon{font-size:22px;width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.menu-btn .icon.blue{background:#dbeafe;color:var(--pri)}
.menu-btn .icon.green{background:#dcfce7;color:var(--ok)}
.menu-btn .icon.red{background:#fee2e2;color:var(--no)}
.menu-btn .icon.purple{background:#ede9fe;color:#7c3aed}
.menu-btn .icon.orange{background:#ffedd5;color:#ea580c}
.menu-btn .info{display:flex;flex-direction:column}
.menu-btn .info small{font-size:12px;color:var(--sub);font-weight:400}

/* TOPIC SELECT */
#topic-select{padding:24px;gap:12px}
#topic-select h2{font-size:20px;font-weight:700}
.topic-btn{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:14px 16px;font-size:15px;font-weight:600;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:all .15s}
.topic-btn:active{transform:scale(.97)}
.topic-btn .cnt{font-size:13px;color:var(--sub);font-weight:400}
.back-btn{background:none;border:none;font-size:15px;color:var(--pri);cursor:pointer;padding:8px 0;font-weight:600;align-self:flex-start}

/* QUIZ */
#quiz{padding:0}
.quiz-header{padding:12px 20px;background:var(--card);border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:10}
.quiz-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.quiz-top .qnum{font-size:14px;font-weight:700;color:var(--pri)}
.quiz-top .topic-tag{font-size:12px;color:var(--sub);background:var(--bg);padding:3px 10px;border-radius:20px}
.quit-btn{background:none;border:none;font-size:13px;color:var(--sub);cursor:pointer}
.progress-bar{height:4px;background:var(--bdr);border-radius:4px;overflow:hidden}
.progress-bar .fill{height:100%;background:var(--pri);border-radius:4px;transition:width .3s}
.quiz-body{flex:1;padding:20px;display:flex;flex-direction:column;gap:16px;overflow-y:auto;padding-bottom:100px}
.question-text{font-size:17px;font-weight:600;line-height:1.6;word-break:keep-all}
.question-text .blank-marker{display:inline-block;min-width:80px;border-bottom:2px solid var(--pri);margin:0 2px;text-align:center;color:var(--pri);font-weight:700}

/* MC OPTIONS */
.options{display:flex;flex-direction:column;gap:10px}
.opt-btn{background:var(--card);border:2px solid var(--bdr);border-radius:12px;padding:14px 16px;font-size:15px;line-height:1.5;cursor:pointer;text-align:left;transition:all .15s;word-break:keep-all}
.opt-btn:active{transform:scale(.98)}
.opt-btn.selected{border-color:var(--pri);background:#eff6ff}
.opt-btn.correct{border-color:var(--ok);background:#f0fdf4}
.opt-btn.wrong{border-color:var(--no);background:#fef2f2}

/* BLANK INPUT */
.blank-input-wrap{display:flex;gap:8px}
.blank-input{flex:1;border:2px solid var(--bdr);border-radius:12px;padding:14px 16px;font-size:16px;outline:none;transition:border .2s}
.blank-input:focus{border-color:var(--pri)}
.check-btn{background:var(--pri);color:#fff;border:none;border-radius:12px;padding:14px 20px;font-size:15px;font-weight:700;cursor:pointer;white-space:nowrap}
.check-btn:active{opacity:.8}

/* EXPLAIN */
.explain-box{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px;padding:14px 16px;font-size:14px;line-height:1.6;display:none;word-break:keep-all}
.explain-box.wrong-explain{background:#fef2f2;border-color:#fecaca}
.explain-box.visible{display:block}
.explain-box .explain-title{font-weight:700;margin-bottom:4px;font-size:13px}

/* QUIZ FOOTER */
.quiz-footer{position:fixed;bottom:0;left:0;right:0;padding:12px 20px;padding-bottom:max(12px,env(safe-area-inset-bottom));background:var(--card);border-top:1px solid var(--bdr);display:flex;gap:10px}
.quiz-footer button{flex:1;padding:14px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;border:none;transition:all .15s}
.quiz-footer button:active{transform:scale(.97)}
.next-btn{background:var(--pri);color:#fff}
.next-btn:disabled{background:var(--bdr);color:var(--sub)}
.skip-btn{background:var(--bg);color:var(--sub);flex:.4}

/* RESULT */
#result{align-items:center;justify-content:center;padding:24px;gap:20px}
#result .score-circle{width:160px;height:160px;border-radius:50%;border:8px solid var(--pri);display:flex;flex-direction:column;align-items:center;justify-content:center}
#result .score-circle .pct{font-size:42px;font-weight:800;color:var(--pri)}
#result .score-circle .label{font-size:13px;color:var(--sub)}
#result .detail{text-align:center;font-size:15px;color:var(--sub);line-height:1.8}
#result .detail b{color:var(--txt)}

/* REVIEW */
#review{padding:16px}
#review h2{font-size:18px;font-weight:700;margin-bottom:12px;position:sticky;top:0;background:var(--bg);padding:8px 0;z-index:5}
.review-card{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:16px;margin-bottom:12px}
.review-card .rv-q{font-size:15px;font-weight:600;line-height:1.5;margin-bottom:8px}
.review-card .rv-ans{font-size:14px;color:var(--ok);margin-bottom:4px}
.review-card .rv-my{font-size:14px;color:var(--no);margin-bottom:8px}
.review-card .rv-exp{font-size:13px;color:var(--sub);line-height:1.5}

/* UTILS */
.mt8{margin-top:8px}.mt16{margin-top:16px}
@media(min-width:500px){
  .quiz-body,.quiz-header,.quiz-footer{max-width:500px;margin-left:auto;margin-right:auto}
  #home,#topic-select,#result,#review{max-width:500px;margin-left:auto;margin-right:auto}
}
</style>
</head>
<body>

<!-- HOME SCREEN -->
<div id="home" class="screen active">
  <h1>MM 중간고사</h1>
  <div class="subtitle">마케팅관리 | 류상희 교수 | Topic 1~5</div>
  <div class="stats">
    <div class="stat"><div class="num" id="s-total">0</div><div class="label">전체 문제</div></div>
    <div class="stat"><div class="num" id="s-done">0</div><div class="label">풀어본 문제</div></div>
    <div class="stat"><div class="num" id="s-rate">-</div><div class="label">정답률</div></div>
    <div class="stat"><div class="num" id="s-wrong">0</div><div class="label">오답 문제</div></div>
  </div>
  <div class="menu">
    <button class="menu-btn" onclick="startMode('all')">
      <span class="icon blue">ALL</span>
      <span class="info">전체 학습<small>모든 문제 순서대로</small></span>
    </button>
    <button class="menu-btn" onclick="showScreen('topic-select')">
      <span class="icon purple">T</span>
      <span class="info">토픽별 학습<small>원하는 토픽만 선택</small></span>
    </button>
    <button class="menu-btn" onclick="startMode('mock')">
      <span class="icon orange">55</span>
      <span class="info">모의고사<small>55문제 랜덤 (선다 85% + 주관 15%)</small></span>
    </button>
    <button class="menu-btn" onclick="startMode('blank')">
      <span class="icon green">___</span>
      <span class="info">빈칸만 학습<small>주관식 빈칸 집중</small></span>
    </button>
    <button class="menu-btn" onclick="startMode('wrong')">
      <span class="icon red">X</span>
      <span class="info">오답 복습<small>틀린 문제만 다시</small></span>
    </button>
  </div>
</div>

<!-- TOPIC SELECT -->
<div id="topic-select" class="screen">
  <button class="back-btn" onclick="showScreen('home')">&larr; 뒤로</button>
  <h2>토픽 선택</h2>
  <div id="topic-list"></div>
</div>

<!-- QUIZ SCREEN -->
<div id="quiz" class="screen">
  <div class="quiz-header">
    <div class="quiz-top">
      <span class="qnum" id="q-num">1/250</span>
      <span class="topic-tag" id="q-topic">Topic 1</span>
      <button class="quit-btn" onclick="endQuiz()">나가기</button>
    </div>
    <div class="progress-bar"><div class="fill" id="q-progress"></div></div>
  </div>
  <div class="quiz-body">
    <div class="question-text" id="q-text"></div>
    <div id="q-options" class="options"></div>
    <div id="q-blank-wrap" class="blank-input-wrap" style="display:none">
      <input type="text" class="blank-input" id="q-blank-input" placeholder="답을 입력하세요" autocomplete="off">
      <button class="check-btn" id="q-check-btn" onclick="checkBlank()">확인</button>
    </div>
    <div class="explain-box" id="q-explain">
      <div class="explain-title" id="q-explain-title">정답!</div>
      <div id="q-explain-text"></div>
    </div>
  </div>
  <div class="quiz-footer">
    <button class="skip-btn" id="btn-skip" onclick="skipQ()">건너뛰기</button>
    <button class="next-btn" id="btn-next" onclick="nextQ()" disabled>다음</button>
  </div>
</div>

<!-- RESULT SCREEN -->
<div id="result" class="screen">
  <div class="score-circle">
    <div class="pct" id="r-pct">0%</div>
    <div class="label">정답률</div>
  </div>
  <div class="detail" id="r-detail"></div>
  <div class="menu" style="max-width:300px">
    <button class="menu-btn" onclick="showReview()" style="justify-content:center">
      <span class="icon red">X</span>
      <span class="info">오답 확인</span>
    </button>
    <button class="menu-btn" onclick="showScreen('home')" style="justify-content:center">
      <span class="icon blue">H</span>
      <span class="info">홈으로</span>
    </button>
  </div>
</div>

<!-- REVIEW SCREEN -->
<div id="review" class="screen">
  <button class="back-btn" onclick="showScreen('result')">&larr; 결과로</button>
  <h2>오답 확인</h2>
  <div id="review-list"></div>
  <button class="menu-btn mt16" onclick="showScreen('home')" style="justify-content:center">
    <span class="icon blue">H</span><span class="info">홈으로</span>
  </button>
</div>

<script>

// ===== STATE =====
let quiz = { questions:[], idx:0, answers:[], mode:'' };
const STORAGE_KEY = 'mm_midterm_v1';

function loadStats(){
  try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {done:new Set(),wrong:new Set(),correct:0,total:0}; }
  catch{ return {done:new Set(),wrong:new Set(),correct:0,total:0}; }
}
function saveStats(s){
  const o = {...s, done:[...s.done], wrong:[...s.wrong]};
  localStorage.setItem(STORAGE_KEY, JSON.stringify(o));
}
function getStats(){
  const raw = loadStats();
  raw.done = new Set(raw.done);
  raw.wrong = new Set(raw.wrong);
  return raw;
}

function updateHome(){
  const s = getStats();
  document.getElementById('s-total').textContent = ALL_QUESTIONS.length;
  document.getElementById('s-done').textContent = s.done.size;
  document.getElementById('s-rate').textContent = s.total > 0 ? Math.round(s.correct/s.total*100)+'%' : '-';
  document.getElementById('s-wrong').textContent = s.wrong.size;
}

// ===== NAVIGATION =====
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='home') updateHome();
  if(id==='topic-select') buildTopicList();
  window.scrollTo(0,0);
}

const TOPIC_NAMES = {1:'마케팅에 대한 이해',2:'시장의 이해',3:'세분화, 표적화, 위치화',4:'소비자의 이해',5:'마케팅 조사'};

function buildTopicList(){
  const el = document.getElementById('topic-list');
  el.innerHTML = '';
  for(let t=1;t<=5;t++){
    const cnt = ALL_QUESTIONS.filter(q=>q.topic===t).length;
    const btn = document.createElement('button');
    btn.className = 'topic-btn';
    btn.innerHTML = `<span>Topic ${t}. ${TOPIC_NAMES[t]}</span><span class="cnt">${cnt}문제</span>`;
    btn.onclick = ()=>startMode('topic',t);
    el.appendChild(btn);
  }
}

// ===== START QUIZ =====
function startMode(mode, topicNum){
  quiz.mode = mode;
  quiz.idx = 0;
  quiz.answers = [];
  let qs = [];

  if(mode==='all'){
    qs = [...ALL_QUESTIONS];
  } else if(mode==='topic'){
    qs = ALL_QUESTIONS.filter(q=>q.topic===topicNum);
  } else if(mode==='mock'){
    // 55문제: mc 47, blank 8
    const mc = ALL_QUESTIONS.filter(q=>q.type==='mc');
    const bl = ALL_QUESTIONS.filter(q=>q.type==='blank');
    shuffle(mc); shuffle(bl);
    qs = [...mc.slice(0,47), ...bl.slice(0,8)];
    shuffle(qs);
  } else if(mode==='blank'){
    qs = ALL_QUESTIONS.filter(q=>q.type==='blank');
    shuffle(qs);
  } else if(mode==='wrong'){
    const s = getStats();
    qs = ALL_QUESTIONS.filter(q=>s.wrong.has(q.id));
    shuffle(qs);
    if(qs.length===0){ alert('오답 문제가 없습니다!'); return; }
  }

  quiz.questions = qs;
  quiz.answers = new Array(qs.length).fill(null);
  showScreen('quiz');
  renderQuestion();
}

function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} }

function matchBlank(userVal, accepts){
  const norm = s => s.replace(/[\s,./·\-()（）]/g,'').toLowerCase().replace(/\u200b/g,'');
  const nVal = norm(userVal);
  return accepts.some(a => {
    const nA = norm(a);
    if(nVal === nA) return true;
    const tokens = a.replace(/[,./·\-()（）]/g,' ').split(/\s+/).filter(t=>t.length>0).map(t=>t.toLowerCase());
    if(tokens.length > 1 && tokens.every(t => userVal.toLowerCase().includes(t))) return true;
    if(nVal.includes(nA) || nA.includes(nVal)) return true;
    return false;
  });
}

// ===== RENDER QUESTION =====
function renderQuestion(){
  const q = quiz.questions[quiz.idx];
  if(!q) return endQuiz();

  // header
  document.getElementById('q-num').textContent = `${quiz.idx+1}/${quiz.questions.length}`;
  document.getElementById('q-topic').textContent = `Topic ${q.topic} > ${q.section}`;
  document.getElementById('q-progress').style.width = `${(quiz.idx/quiz.questions.length)*100}%`;

  // question
  const qText = document.getElementById('q-text');
  if(q.type==='blank'){
    qText.innerHTML = q.q.replace(/______/g, '<span class="blank-marker">______</span>');
  } else {
    qText.textContent = q.q;
  }

  // options or blank
  const optWrap = document.getElementById('q-options');
  const blankWrap = document.getElementById('q-blank-wrap');
  const explainBox = document.getElementById('q-explain');

  optWrap.innerHTML = '';
  explainBox.classList.remove('visible');
  explainBox.classList.remove('wrong-explain');
  document.getElementById('btn-next').disabled = true;
  document.getElementById('btn-skip').style.display = '';

  if(q.type==='mc'){
    blankWrap.style.display = 'none';
    optWrap.style.display = '';
    q.options.forEach((opt,i)=>{
      const btn = document.createElement('button');
      btn.className = 'opt-btn';
      btn.textContent = opt;
      btn.onclick = ()=>selectOption(i);
      optWrap.appendChild(btn);
    });
  } else {
    optWrap.style.display = 'none';
    blankWrap.style.display = '';
    const input = document.getElementById('q-blank-input');
    input.value = '';
    input.focus();
    document.getElementById('q-check-btn').disabled = false;
  }
}

// ===== MC ANSWER =====
function selectOption(idx){
  const q = quiz.questions[quiz.idx];
  if(quiz.answers[quiz.idx] !== null) return; // already answered

  quiz.answers[quiz.idx] = idx;
  const btns = document.querySelectorAll('.opt-btn');
  btns.forEach((b,i)=>{
    b.onclick = null;
    if(i===q.answer) b.classList.add('correct');
    if(i===idx && idx!==q.answer) b.classList.add('wrong');
  });

  showExplain(idx===q.answer);
  recordAnswer(q, idx===q.answer);
}

// ===== BLANK ANSWER =====
function checkBlank(){
  const q = quiz.questions[quiz.idx];
  if(quiz.answers[quiz.idx] !== null) return;

  const input = document.getElementById('q-blank-input');
  const val = input.value.trim();
  if(!val) return;

  const accepts = q.accept || [q.answer];
  const norm = s => s.replace(/[\s,./·\-()（）]/g,'').toLowerCase().replace(/\u200b/g,'');
  const nVal = norm(val);
  const isCorrect = accepts.some(a => {
    const nA = norm(a);
    // exact match after normalization
    if(nVal === nA) return true;
    // check if all key tokens from answer exist in user input (order-independent)
    const tokens = a.replace(/[,./·\-()（）]/g,' ').split(/\s+/).filter(t=>t.length>0).map(t=>t.toLowerCase());
    if(tokens.length > 1 && tokens.every(t => val.toLowerCase().includes(t))) return true;
    // check if user input contains the core answer
    if(nVal.includes(nA) || nA.includes(nVal)) return true;
    return false;
  });

  quiz.answers[quiz.idx] = val;
  input.disabled = true;
  document.getElementById('q-check-btn').disabled = true;

  if(isCorrect){
    input.style.borderColor = 'var(--ok)';
    input.style.background = '#f0fdf4';
  } else {
    input.style.borderColor = 'var(--no)';
    input.style.background = '#fef2f2';
  }

  showExplain(isCorrect);
  recordAnswer(q, isCorrect);
}

// Enter key for blank
document.addEventListener('keydown', e=>{
  if(e.key==='Enter' && document.getElementById('q-blank-wrap').style.display!=='none'){
    checkBlank();
  }
});

function showExplain(correct){
  const q = quiz.questions[quiz.idx];
  const box = document.getElementById('q-explain');
  const title = document.getElementById('q-explain-title');
  const text = document.getElementById('q-explain-text');

  if(correct){
    title.textContent = 'O 정답!';
    box.classList.remove('wrong-explain');
  } else {
    const ans = q.type==='mc' ? q.options[q.answer] : q.answer;
    title.textContent = 'X 오답 | 정답: ' + ans;
    box.classList.add('wrong-explain');
  }
  text.textContent = q.explain || '';
  box.classList.add('visible');

  document.getElementById('btn-next').disabled = false;
  document.getElementById('btn-skip').style.display = 'none';
}

function recordAnswer(q, correct){
  const s = getStats();
  s.done.add(q.id);
  s.total++;
  if(correct){
    s.correct++;
    s.wrong.delete(q.id);
  } else {
    s.wrong.add(q.id);
  }
  saveStats(s);
}

// ===== NAVIGATION =====
function nextQ(){
  quiz.idx++;
  if(quiz.idx >= quiz.questions.length) return endQuiz();
  renderQuestion();
  window.scrollTo(0,0);
}

function skipQ(){
  quiz.idx++;
  if(quiz.idx >= quiz.questions.length) return endQuiz();
  renderQuestion();
  window.scrollTo(0,0);
}

function endQuiz(){
  const answered = quiz.answers.filter(a=>a!==null).length;
  const correct = quiz.answers.filter((a,i)=>{
    const q = quiz.questions[i];
    if(a===null) return false;
    if(q.type==='mc') return a===q.answer;
    const accepts = q.accept || [q.answer];
    return matchBlank(String(a), accepts);
  }).length;

  const pct = answered>0 ? Math.round(correct/answered*100) : 0;
  document.getElementById('r-pct').textContent = pct+'%';
  document.getElementById('r-detail').innerHTML =
    `<b>${answered}</b>문제 중 <b>${correct}</b>문제 정답<br>` +
    `틀린 문제: <b style="color:var(--no)">${answered-correct}</b>개 | 건너뛴: <b>${quiz.questions.length-answered}</b>개`;

  showScreen('result');
}

function showReview(){
  const list = document.getElementById('review-list');
  list.innerHTML = '';

  quiz.answers.forEach((a,i)=>{
    const q = quiz.questions[i];
    if(a===null) return;

    let isCorrect;
    if(q.type==='mc') isCorrect = a===q.answer;
    else {
      const accepts = q.accept || [q.answer];
      isCorrect = matchBlank(String(a), accepts);
    }
    if(isCorrect) return;

    const card = document.createElement('div');
    card.className = 'review-card';
    const myAns = q.type==='mc' ? q.options[a] : a;
    const correctAns = q.type==='mc' ? q.options[q.answer] : q.answer;
    card.innerHTML = `
      <div class="rv-q">Q. ${q.q}</div>
      <div class="rv-ans">O 정답: ${correctAns}</div>
      <div class="rv-my">X 내 답: ${myAns}</div>
      <div class="rv-exp">${q.explain||''}</div>
    `;
    list.appendChild(card);
  });

  if(list.children.length===0){
    list.innerHTML = '<p style="text-align:center;color:var(--sub);padding:40px">틀린 문제가 없습니다!</p>';
  }

  showScreen('review');
}

// ===== INIT =====
updateHome();
</script>
